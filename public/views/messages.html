<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | StudentHub</title>
  <link rel="stylesheet" href="../style2landing.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="../loadHeader.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #f1f5f9;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Messages page: hide marketplace search + filters in global header (mobile) */
    @media (max-width: 768px) {
      body.page-messages .mobile-search-row {
        display: none !important;
      }
      body.page-messages {
        padding-top: 72px !important;
      }
    }

    @media (max-width: 480px) {
      body.page-messages {
        padding-top: 68px !important;
      }
    }

    .messages-page {
      margin-top: 100px;
      display: flex;
      height: calc(100vh - 100px);
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      padding: 20px;
      gap: 20px;
    }

    /* Conversations Sidebar */
    .conversations-sidebar {
      width: 360px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .conversation-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 8px;
    }

    .conversation-item:hover {
      background: #f3f4f6;
    }

    .conversation-item.active {
      background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
      border: 1px solid #667eea30;
    }

    .conversation-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .conversation-info {
      flex: 1;
      min-width: 0;
    }

    .conversation-name {
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .conversation-time {
      font-size: 0.75rem;
      color: #9ca3af;
      font-weight: 400;
    }

    .conversation-preview {
      font-size: 0.875rem;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .unread-badge {
      background: #ef4444;
      color: white;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .no-conversations {
      padding: 40px 20px;
      text-align: center;
      color: #6b7280;
    }

    .empty-state-graphic {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state-graphic svg {
      width: 26px;
      height: 26px;
      color: #9ca3af;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fafafa;
    }

    .chat-header-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }

    .chat-header-info h3 {
      margin: 0 0 4px 0;
      font-size: 1.1rem;
      color: #111827;
    }

    .chat-header-info p {
      margin: 0;
      font-size: 0.85rem;
      color: #6b7280;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: #f8fafc;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
    }

    .message.sent {
      align-self: flex-end;
    }

    .message.received {
      align-self: flex-start;
    }

    .message-bubble {
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.received .message-bubble {
      background: white;
      color: #111827;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .message-time {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-top: 6px;
      padding: 0 4px;
    }

    .message.sent .message-time {
      text-align: right;
    }

    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
      background: white;
    }

    .chat-input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e5e7eb;
      border-radius: 25px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease;
      font-family: inherit;
    }

    .chat-input:focus {
      border-color: #667eea;
    }

    .send-btn {
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    .send-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* No chat selected state */
    .no-chat-selected {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      padding: 40px;
      text-align: center;
    }

    .no-chat-graphic {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .no-chat-graphic svg {
      width: 32px;
      height: 32px;
      color: #9ca3af;
    }

    .no-chat-selected h3 {
      margin: 0 0 8px 0;
      font-size: 1.3rem;
      color: #374151;
    }

    .no-chat-selected p {
      margin: 0;
      font-size: 0.95rem;
    }

    /* Product context banner */
    .product-context {
      padding: 10px 24px;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.8125rem;
      color: #475569;
    }

    .product-context-label {
      font-weight: 600;
      color: #64748b;
      margin-right: 6px;
    }

    .product-context strong {
      color: #0f172a;
      font-weight: 600;
    }

    /* Back to inbox (mobile thread view) */
    .chat-back-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      margin-right: 4px;
      margin-left: -8px;
      padding: 0;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #374151;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s ease;
    }

    .chat-back-btn:hover {
      background: #e5e7eb;
    }

    .chat-back-btn svg {
      width: 22px;
      height: 22px;
    }

    /* Loading states */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Date separator */
    .date-separator {
      text-align: center;
      padding: 8px 0;
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .date-separator span {
      background: #f1f5f9;
      padding: 4px 12px;
      border-radius: 10px;
    }

    /* Tablet responsive */
    @media (max-width: 1024px) {
      .conversations-sidebar {
        width: 300px;
      }
      
      .sidebar-header h2 {
        font-size: 1.1rem;
      }
      
      .conversation-avatar {
        width: 40px;
        height: 40px;
        font-size: 0.9rem;
      }
    }

    /* Mobile: inbox OR thread (not stacked) */
    @media (max-width: 768px) {
      .messages-page {
        margin-top: 0;
        flex-direction: column;
        padding: 0;
        gap: 0;
        height: calc(100vh - 72px);
        max-height: calc(100vh - 72px);
        min-height: 0;
      }

      .conversations-sidebar {
        width: 100%;
        max-height: none;
        flex: 1;
        min-height: 0;
        border-radius: 0;
        box-shadow: none;
        display: flex;
        flex-direction: column;
      }

      .messages-page.thread-open .conversations-sidebar {
        display: none;
      }

      .chat-area {
        display: none;
        flex: 1;
        flex-direction: column;
        min-height: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .messages-page.thread-open .chat-area {
        display: flex;
      }

      .chat-messages {
        flex: 1;
        min-height: 0;
      }

      .chat-back-btn {
        display: inline-flex;
      }

      .sidebar-header {
        padding: 14px 18px;
      }

      .sidebar-header h2 {
        font-size: 1.05rem;
      }

      .conversations-list {
        padding: 8px;
      }

      .conversation-item {
        padding: 12px 14px;
        gap: 12px;
      }

      .conversation-avatar {
        width: 40px;
        height: 40px;
        font-size: 0.85rem;
      }

      .conversation-preview {
        font-size: 0.8125rem;
      }

      .chat-header {
        padding: 10px 14px;
        flex-shrink: 0;
      }

      .chat-header-avatar {
        width: 38px;
        height: 38px;
        font-size: 0.85rem;
      }

      .chat-header-info h3 {
        font-size: 1rem;
      }

      .chat-header-info p {
        font-size: 0.75rem;
      }

      .message {
        max-width: 88%;
      }

      .chat-input-area {
        padding: 10px 12px;
        gap: 8px;
        flex-shrink: 0;
      }

      .chat-input {
        flex: 1;
        min-width: 0;
        padding: 12px 16px;
        font-size: 16px;
      }

      .send-btn {
        padding: 12px 18px;
        font-size: 0.875rem;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .no-chat-selected h3 {
        font-size: 1.05rem;
      }

      .product-context {
        padding: 8px 14px;
        font-size: 0.8125rem;
        flex-shrink: 0;
      }

      #footer {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .messages-page {
        height: calc(100vh - 68px);
        max-height: calc(100vh - 68px);
      }
    }

    /* Desktop / tablet: always show split layout even when thread is "open" */
    @media (min-width: 769px) {
      .messages-page.thread-open .conversations-sidebar {
        display: flex !important;
      }

      .messages-page.thread-open .chat-area {
        display: flex !important;
      }

      .chat-back-btn {
        display: none !important;
      }
    }
  </style>
</head>
<body class="page-messages">
  <div id="header"></div>

  <div class="messages-page" id="messagesPage">
    <!-- Conversations Sidebar -->
    <div class="conversations-sidebar">
      <div class="sidebar-header">
        <h2>Messages</h2>
      </div>
      <div class="conversations-list" id="conversationsList">
        <div class="loading-spinner">
          <div class="spinner"></div>
        </div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="no-chat-selected">
        <div class="no-chat-graphic" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" /></svg>
        </div>
        <h3>Select a conversation</h3>
        <p>Choose someone from the list to open the thread.</p>
      </div>
    </div>
  </div>

  <div id="footer"></div>
  <script src="../messages.js"></script>
</body>
</html>
